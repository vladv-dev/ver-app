name: Deploy (GitHub Pages)

# Proves the deploy pipeline end to end by publishing a static export of the
# app to GitHub Pages. Production target is Vercel (see README) — this Pages
# deploy is the autonomous, token-free way to get a reachable URL on every push.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static export
        env:
          DEPLOY_TARGET: github-pages
          PAGES_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
